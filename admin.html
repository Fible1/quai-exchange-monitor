<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Monitor Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0b0e11; --panel: #14181d; --line: #262c33;
    --text: #e8eaed; --muted: #8b949e;
    --crimson: #e4342b; --jade: #3fb68b;
    --mono: "IBM Plex Mono", monospace; --sans: "Space Grotesk", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--ink); color: var(--text); font-family: var(--sans);
    min-height: 100vh; padding: 3rem 1.25rem;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 1.05rem; font-weight: 700; margin-bottom: .4rem; }
  h1 span { color: var(--crimson); }
  .sub { font-family: var(--mono); font-size: .72rem; color: var(--muted); margin-bottom: 2rem; }
  .panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; padding: 1.5rem;
  }
  label {
    display: block; font-family: var(--mono); font-size: .72rem;
    text-transform: uppercase; letter-spacing: .12em; color: var(--muted);
    margin: 1.1rem 0 .4rem;
  }
  label:first-child { margin-top: 0; }
  input {
    width: 100%; background: var(--ink); border: 1px solid var(--line);
    border-radius: 6px; color: var(--text); font-family: var(--mono);
    font-size: .9rem; padding: .55rem .7rem;
  }
  input:focus { outline: 2px solid var(--crimson); outline-offset: 1px; }
  textarea {
    width: 100%; background: var(--ink); border: 1px solid var(--line);
    border-radius: 6px; color: var(--text); font-family: var(--mono);
    font-size: .78rem; padding: .55rem .7rem; resize: vertical;
  }
  textarea:focus { outline: 2px solid var(--crimson); outline-offset: 1px; }
  .pending {
    background: var(--ink); border: 1px solid var(--line); border-radius: 6px;
    padding: .4rem .6rem; font-family: var(--mono); font-size: .74rem;
  }
  .pending-empty { color: var(--muted); }
  .pending-row {
    display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
    padding: .45rem 0; border-bottom: 1px solid var(--line);
  }
  .pending-row:last-child { border-bottom: none; }
  .pending-row code { color: var(--muted); }
  .pending-row .plabel { color: var(--text); font-weight: 600; }
  .pending-row button {
    margin: 0; width: auto; padding: .3rem .7rem; font-size: .72rem;
  }
  .pending-row button.reject { background: var(--panel); border: 1px solid var(--line); color: var(--muted); }
  .btnrow { display: flex; gap: .7rem; margin-top: 1.4rem; }
  .btnrow button { margin-top: 0; flex: 1; }
  button.secondary { background: var(--panel); border: 1px solid var(--line); color: var(--text); }
  button.secondary:hover { border-color: var(--muted); }
  button {
    margin-top: 1.4rem; width: 100%; background: var(--crimson); border: none;
    border-radius: 6px; color: #fff; font-family: var(--sans); font-weight: 500;
    font-size: .9rem; padding: .7rem 1rem; cursor: pointer;
  }
  button:hover { filter: brightness(1.1); }
  #msg { margin-top: .9rem; font-family: var(--mono); font-size: .75rem; color: var(--muted); min-height: 1.2em; }
  #msg.ok { color: var(--jade); }
  #msg.err { color: var(--crimson); }
  .back {
    display: inline-block; margin-top: 1.6rem; font-family: var(--mono);
    font-size: .72rem; color: var(--muted); text-decoration: none;
    border-bottom: 1px dotted var(--line);
  }
  .back:hover { color: var(--text); }
</style>
</head>
<body>
<div class="wrap">
  <h1>QUAI Monitor <span>/</span> Admin</h1>
  <div class="sub">Alert configuration · changes require the secret</div>

  <div class="panel">
    <label for="pct">Alert when a wallet's 24h move exceeds (% of combined 3-exchange holdings)</label>
    <input id="pct" type="number" min="0.01" max="100" step="0.01">

    <label for="whale">Whale feed: log transfers ≥ (% of combined watched balance)</label>
    <input id="whale" type="number" min="0.01" max="10" step="0.01">

    <label for="watchlist">Watched addresses (private) — any incoming tx alerts your phone/email. One per line: address, then optional label</label>
    <textarea id="watchlist" rows="5" spellcheck="false" placeholder="0x0050AF0000000000000000000000000000000000 my cold wallet"></textarea>

    <label for="ptags">Public counterparty tags — shown to everyone in the whale feed. One per line: address, then label</label>
    <textarea id="ptags" rows="5" spellcheck="false" placeholder="0x00177e9305777f6abcc97c1f907844e13b5cc934 arb bot?"></textarea>

    <label>Pending tag suggestions</label>
    <div id="pending" class="pending"><span class="pending-empty">Load settings to review suggestions.</span></div>

    <label for="secret">Secret</label>
    <input id="secret" type="password" placeholder="CRON_SECRET" autocomplete="off">

    <div class="btnrow">
      <button id="load" class="secondary" type="button">Load current settings</button>
      <button id="save" type="button">Save all settings</button>
    </div>
    <div id="msg"></div>
  </div>

  <a class="back" href="/">← back to dashboard</a>
</div>

<script>
// Prefill public thresholds immediately; the private watchlist needs the secret.
fetch("/api/config")
  .then(r => r.json())
  .then(j => {
    if (j.thresholdPercent) document.getElementById("pct").value = j.thresholdPercent;
    if (j.whaleTxPercent) document.getElementById("whale").value = j.whaleTxPercent;
  })
  .catch(() => {});

document.getElementById("load").addEventListener("click", async () => {
  const msg = document.getElementById("msg");
  const secret = document.getElementById("secret").value;
  msg.className = "";
  if (!secret) {
    msg.textContent = "Enter the secret to load the watchlist.";
    msg.className = "err";
    return;
  }
  try {
    const r = await fetch("/api/config?secret=" + encodeURIComponent(secret));
    const j = await r.json();
    if (j.thresholdPercent) document.getElementById("pct").value = j.thresholdPercent;
    if (j.whaleTxPercent) document.getElementById("whale").value = j.whaleTxPercent;
    if (Array.isArray(j.publicTags)) {
      document.getElementById("ptags").value = j.publicTags
        .map(w => w.addr + " " + w.label).join("\n");
    }
    if (Array.isArray(j.watchedAddresses)) {
      document.getElementById("watchlist").value = j.watchedAddresses
        .map(w => w.addr + (w.label ? " " + w.label : ""))
        .join("\n");
      renderPending(j.pendingTags || []);
      msg.textContent = `Loaded ${j.watchedAddresses.length} watched, ${(j.publicTags||[]).length} tags, ${(j.pendingTags||[]).length} pending.`;
      msg.className = "ok";
    } else {
      msg.textContent = "Wrong secret — watchlist not returned.";
      msg.className = "err";
    }
  } catch (e) {
    msg.textContent = "Load failed — network error.";
    msg.className = "err";
  }
});

function renderPending(list) {
  const box = document.getElementById("pending");
  if (!list.length) {
    box.innerHTML = '<span class="pending-empty">No pending suggestions.</span>';
    return;
  }
  const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  box.innerHTML = list.map(p => `
    <div class="pending-row">
      <code>${esc(p.addr.slice(0,10))}…${esc(p.addr.slice(-6))}</code>
      <span class="plabel">${esc(p.label)}</span>
      <button data-id="${esc(p.id)}" data-act="approve">Approve</button>
      <button data-id="${esc(p.id)}" data-act="reject" class="reject">Reject</button>
    </div>`).join("");
  box.onclick = async (ev) => {
    const b = ev.target.closest("button[data-id]");
    if (!b) return;
    const secret = document.getElementById("secret").value;
    const msg = document.getElementById("msg");
    if (!secret) { msg.textContent = "Enter the secret first."; msg.className = "err"; return; }
    const payload = { secret };
    payload[b.dataset.act === "approve" ? "approveIds" : "rejectIds"] = [b.dataset.id];
    const r = await fetch("/api/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (r.ok) {
      msg.textContent = b.dataset.act === "approve" ? "Approved — tag is now live." : "Rejected.";
      msg.className = "ok";
      document.getElementById("load").click();
    } else {
      const j = await r.json();
      msg.textContent = j.error || "Action failed.";
      msg.className = "err";
    }
  };
}

function parsePtags() {
  const lines = document.getElementById("ptags").value
    .split("\n").map(l => l.trim()).filter(Boolean);
  const out = [];
  for (const line of lines) {
    const sp = line.indexOf(" ");
    if (sp === -1) return { error: `Tag label required: "${line.slice(0, 30)}…"` };
    const addr = line.slice(0, sp);
    const label = line.slice(sp + 1).trim();
    if (!/^0x[0-9a-fA-F]{40}$/.test(addr)) return { error: `Invalid tag address: "${addr.slice(0, 30)}…"` };
    if (!label) return { error: `Tag label required for ${addr.slice(0, 12)}…` };
    out.push({ addr, label });
  }
  if (out.length > 200) return { error: "Maximum 200 public tags." };
  return { list: out };
}

function parseWatchlist() {
  const lines = document.getElementById("watchlist").value
    .split("\n").map(l => l.trim()).filter(Boolean);
  const out = [];
  for (const line of lines) {
    const sp = line.indexOf(" ");
    const addr = sp === -1 ? line : line.slice(0, sp);
    const label = sp === -1 ? "" : line.slice(sp + 1).trim();
    if (!/^0x[0-9a-fA-F]{40}$/.test(addr)) {
      return { error: `Invalid address: "${addr.slice(0, 30)}…" — must be 0x + 40 hex characters.` };
    }
    out.push({ addr, label });
  }
  if (out.length > 20) return { error: "Maximum 20 watched addresses." };
  return { list: out };
}

document.getElementById("save").addEventListener("click", async () => {
  const msg = document.getElementById("msg");
  const pct = parseFloat(document.getElementById("pct").value);
  const whale = parseFloat(document.getElementById("whale").value);
  const secret = document.getElementById("secret").value;

  msg.className = "";
  if (!Number.isFinite(pct) || pct <= 0 || pct > 100) {
    msg.textContent = "Alert threshold must be between 0.01 and 100.";
    msg.className = "err";
    return;
  }
  if (!Number.isFinite(whale) || whale <= 0 || whale > 10) {
    msg.textContent = "Whale feed percent must be between 0.01 and 10.";
    msg.className = "err";
    return;
  }
  const wl = parseWatchlist();
  if (wl.error) {
    msg.textContent = wl.error;
    msg.className = "err";
    return;
  }
  const pt = parsePtags();
  if (pt.error) {
    msg.textContent = pt.error;
    msg.className = "err";
    return;
  }
  if (!secret) {
    msg.textContent = "Enter the secret to save.";
    msg.className = "err";
    return;
  }

  msg.textContent = "Saving…";
  try {
    const r = await fetch("/api/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ thresholdPercent: pct, whaleTxPercent: whale, watchedAddresses: wl.list, publicTags: pt.list, secret }),
    });
    const j = await r.json();
    if (r.ok) {
      msg.textContent = "Saved. Both settings apply from the next check.";
      msg.className = "ok";
    } else {
      msg.textContent = j.error === "wrong secret" ? "Wrong secret." : (j.error || "Save failed.");
      msg.className = "err";
    }
  } catch (e) {
    msg.textContent = "Save failed — network error.";
    msg.className = "err";
  }
});
</script>
</body>
</html>
